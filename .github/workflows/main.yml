name: Update Ad Filters

on:
  schedule:
    - cron: '0 19 * * *'  # everyday UTC 19:00（BeiJing Time 03:00）
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  update-filter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run update script
        run: |
          set -e
          bash scripts/matrix_get.sh
          bash scripts/matrix_lighten.sh
          bash scripts/matrix_fuel.sh
          bash scripts/matrix_launch.sh

      - name: Final cleanup
        if: always()
        run: |
          rm -rf rules/ easylist/ scripts/ || true