name: Ad Filters

on:
  schedule:
    - cron: "0 19 * * *"  # 每天 UTC 19:00（北京时间 03:00，UTC+8）
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  update-filter:
    name: Update Adblock Filters
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
          
      - name: Error check
        run: |
          set -eo pipefail
          mkdir -p rules/

      - name: Clone EasyList - all
        run: git clone --depth 1 https://github.com/easylist/easylist.git

      - name: Choose filters
        run: |
          #easylist
          rm -f easylist/easylist/easylist_allowlist_general_hide.txt
          rm -f easylist/easylist/easylist_general_hide.txt
          rm -f easylist/easylist/easylist_specific_hide.txt
          rm -f easylist/easylist/easylist_specific_hide_abp.txt
          mv easylist/easylist/*.txt rules/
          #easylist_adult
          rm -f easylist/easylist_adult/adult_specific_hide.txt
          mv easylist/easylist_adult/*.txt rules/
          #easyprivacy
          mv easylist/easyprivacy/easyprivacy_allowlist_international.txt rules/
          mv easylist/easyprivacy/easyprivacy_specific_international.txt rules/
          mv easylist/easyprivacy/easyprivacy_thirdparty_international.txt rules/
          mv easylist/easyprivacy/easyprivacy_general.txt rules/
          mv easylist/easyprivacy/easyprivacy_specific.txt rules/
          mv easylist/easyprivacy/easyprivacy_thirdparty.txt rules/
          mv easylist/easyprivacy/easyprivacy_trackingservers.txt rules/
          mv easylist/easyprivacy/easyprivacy_trackingservers_mining.txt rules/
          mv easylist/easyprivacy/easyprivacy_trackingservers_thirdparty.txt rules/

          rm -rf easylist/

      - name: Download additional rules
        run: |
          download_filters() {
            curl -fsSL "https://raw.githubusercontent.com/easylist/easylistchina/master/easylistchina.txt" -o rules/EasyChina.txt &
            curl -fsSL "https://raw.githubusercontent.com/cjx82630/cjxlist/master/cjx-annoyance.txt" -o rules/CJXlist.txt &
            curl -fsSL "https://raw.githubusercontent.com/xinggsf/Adblock-Plus-Rule/master/rule.txt" -o rules/Xinggsf.txt &
            curl -fsSL "https://raw.githubusercontent.com/Lky777/MWCP/refs/heads/main/rules/fix.txt" -o rules/fixit.txt &
            wait # 等待所有下载完成
          }
          download_filters || { echo "一个或多个下载失败"; exit 1; }

      - name: Process filters
        run: |
          {
            awk '/^!/ {flag=0} /^! \$document$/ {flag=1} flag' rules/easylist_adservers.txt
            awk '/^!/ {flag=0} /^! Third-party$/ {flag=1} flag' rules/easylist_adservers.txt
            awk '/^!/ {flag=0} /^! Chinese$/ {flag=1} flag' rules/easylist_adservers.txt
            awk '/^!/ {flag=0} /^! IP$/ {flag=1} flag' rules/easylist_adservers.txt
          } > rules/Easylist_ads.txt
          rm -f rules/easylist_adservers.txt

          awk '/^!/ && /Chinese/ {flag=1; next} /^!/ {flag=0} flag' \
            rules/easyprivacy_{allowlist,specific,thirdparty}_international.txt > rules/Easyprivacy_a.txt
          rm -f rules/easyprivacy_allowlist_international.txt
          rm -f rules/easyprivacy_specific_international.txt
          rm -f rules/easyprivacy_thirdparty_international.txt

          sed -i '/##+js/!{/##\|#@#/d}' rules/EasyChina.txt
          sed -i '/##+js/!{/##\|#@#/d}' rules/CJXlist.txt
          sed -i '/##+js/!{/##\|#@#/d}' rules/Xinggsf.txt

      - name: Merge all rules
        id: merge_rules
        run: |        
          cat rules/*.txt > rules/combined_rules.txt
          sort -u rules/combined_rules.txt
          sed -i '/^\*_/ s/\*//' rules/combined_rules.txt
          sed -i '/^[*][.*/]/s/*//' rules/combined_rules.txt
          sed -i '/^\/\\./d' rules/combined_rules.txt
          sed -i '/^\/\^https/d' rules/combined_rules.txt
          sed -i '/\/ads\// { /@@/! /~/! d }' rules/combined_rules.txt
          sed -i '/\.gif?/ { /@@/! /~/! d }' rules/combined_rules.txt
          echo "" >> rules/combined_rules.txt
          echo "/ads/" >> rules/combined_rules.txt
          echo ".gif?" >> rules/combined_rules.txt
          
      - name: Generate rules
        id: generate_rules
        run: |
          echo "[Adblock Plus 2.0]
          ! Title: MobiListChina
          ! Description: blocker for Chinese mobile site
          ! Version: $(date +%Y%m%d%H%M)
          ! Last modified: $(date -u +"%d %b %Y %H:%M UTC")
          ! Expires: 1 day
          ! Homepage: https://github.com/Lky777/MWCP/
          ! ---------------------------------" > rules/MobiListChina.txt
          grep -v -e '^!' -e '^$' -e '^[[:space:]]*$' rules/combined_rules.txt | sort -u >> rules/MobiListChina.txt
                    
          # 计算规则数
          rule_count=$(grep -v -c -e '^!' rules/MobiListChina.txt)
          echo "rule_count=$rule_count" >> $GITHUB_OUTPUT
          echo "✓ 合并完成！规则总数: $rule_count"

      - name: Commit changes
        if: steps.generate_rules.outcome == 'success'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add rules/MobiListChina.txt
          
          if git diff --cached --quiet; then
            echo "无变化可提交"
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC') - ${{ steps.generate_rules.outputs.rule_count }} rules"
            git push
            echo "✓ 变更已提交"
          fi
    
      - name: Refresh jsDelivr cache
        run: |
          curl -X PURGE "https://fastly.jsdelivr.net/gh/Lky777/MWCP/rules/MobiListChina.txt"
          
      - name: Cleanup
        if: always()
        run: |
          rm -rf easylist/ 
          rm -rf rules/