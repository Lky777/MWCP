name: 2.build asservs.txt

on:
  schedule:
    - cron: '50 18 * * *'  # Daily at 18:50 UTC (02:50 Beijing Time)
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  update-filter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run update script
        run: |
          set -e
          bash scripts/sand_wash.sh

      - name: Final cleanup
        if: always()
        run: |
          rm -rf rules/ scripts/ || true
