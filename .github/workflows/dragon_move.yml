name: 自动更新 dragon.txt

on:
  schedule:
    - cron: '20 18 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  update-dragon:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 运行 dragon_move.py
        run: python3 dragon_move.py rules/dragon.txt rules/dragon_add.txt

      - name: 提交并推送更改
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add rules/dragon.txt
          if git diff --quiet --cached --exit-code; then
            echo "没有检测到文件变更"
          else
            git commit -m "自动更新: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "变更已推送"
          fi