name: 1.fix dragon.txt

on:
  schedule:
    - cron: '20 18 * * 1'  # every Monday at UTC 18:20 (BeiJing Time 02:20 Tuesday)
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  update-filter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update rules
        run: |
          bash scripts/dragon_move.sh

      - name: git push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add rules/dragon.txt
          if ! git diff --quiet -- rules/dragon.txt || ! git diff --quiet --cached -- rules/dragon.txt; then
              echo "Changes detected, committing..."
              git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
              git push
          else
              echo "No changes detected."
          fi