name: Ad Filters

on:
  schedule:
    - cron: "0 15 * * *"  # 每天 UTC 15:00 (北京时间 23:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-filter:
    name: Update Adblock Filters
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download rules
        run: |
          set -eo pipefail
          mkdir -p rules

          # Download and process each filter
          curl -fsSL "https://easylist-downloads.adblockplus.org/easylist_noelemhide.txt" -o rules/Easylist_NoEle.txt
          curl -fsSL "https://filters.adtidy.org/extension/chromium/filters/118_optimized.txt" -o rules/EasyPrivacy.txt
          curl -fsSL "https://raw.githubusercontent.com/xinggsf/Adblock-Plus-Rule/refs/heads/master/rule.txt" -o rules/Xinggsf.txt
          curl -fsSL "https://raw.githubusercontent.com/Lky777/MWCP/refs/heads/main/rules/fix.txt" -o rules/fixit.txt

          curl -fsSL "https://filters.adtidy.org/extension/chromium/filters/224.txt" -o temp1.txt && \
            grep -Ev "!|##|#@#|#\?#" temp1.txt > rules/AdgCN.txt && \
            rm -f temp1.txt

          curl -fsSL "https://raw.githubusercontent.com/cjx82630/cjxlist/master/cjx-annoyance.txt" -o temp2.txt && \
            grep -Ev "!|##|#@#|#\?#" temp2.txt > rules/cjx.txt && \
            rm -f temp2.txt

      - name: Merge all rules
        id: merge_rules
        run: |
          echo "→ 合并规则..."
          {
            echo "[Adblock Plus 2.0]"
            echo "! Title: MobiListChina"
            echo "! Description: MobileWeb Filters"
            echo "! Version: $(date +%Y%m%d%H%M)"
            echo "! Last modified: $(date -u +"%d %b %Y %H:%M UTC")"
            echo "! Expires: 1 day"
            echo "! Homepage: https://github.com/Lky777/MWCP/"
            echo "! ---------------------------------"
            cat rules/*.txt | grep -v -e '^!' -e '^$' -e '^[[:space:]]*$' | sort -u
          } > rules/MobiListChina.txt
          
          # 计算规则数
          rule_count=$(grep -v -e '^!' -e '^$' -e '^[[:space:]]*$' rules/MobiListChina.txt | wc -l | awk '{print $1}')
          echo "rule_count=$rule_count" >> $GITHUB_OUTPUT
          echo "✓ 合并完成！规则总数: $rule_count"

          # 安全清理
          rm -f rules/AdgCN.txt rules/cjx.txt rules/Easylist_NoEle.txt rules/EasyPrivacy.txt rules/Xinggsf.txt

      - name: Commit changes
        if: steps.merge_rules.outcome == 'success'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add rules/MobiListChina.txt
          
          if git diff --cached --quiet; then
            echo "无变化可提交"
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC') - ${{ steps.merge_rules.outputs.rule_count }} rules"
            git push
            echo "✓ 变更已提交"
          fi
