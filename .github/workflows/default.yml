name: Ad Filters

on:
  schedule:
    - cron: "0 15 * * *"  # automatically runs at 15:00 UTC (23:00 Beijing Time, UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-filter:
    name: Update Adblock Filters
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download and merge rules
        id: dl_merge_rules
        run: |
          set -eo pipefail
          mkdir -p rules

          # Download and process EasylistChina
          echo "→ Processing EasylistChina..."
          curl -sSfL https://easylist-downloads.adblockplus.org/easylistchina.txt -o tmp.txt
          grep -Ev "!|##|#@#|#\?#" tmp.txt > rules/EasylistChina_NoEle.txt
          rm -f tmp.txt

          # Rule sources configuration
          declare -A sources=(
            ["CJX_annoyance"]="https://fastly.jsdelivr.net/gh/cjx82630/cjxlist/CJX-annoyance.txt"
            ["Easylist_NoEle"]="https://easylist-downloads.adblockplus.org/easylist_noelemhide.txt"
            ["EasyPrivacy"]="https://filters.adtidy.org/extension/chromium/filters/118_optimized.txt"
            ["Xinggsf"]="https://fastly.jsdelivr.net/gh/xinggsf/Adblock-Plus-Rule/rule.txt"
          )

          # Download rules in parallel
          echo "→ Downloading additional rules..."
          for name in "${!sources[@]}"; do
            url="${sources[$name]}"
            (echo "  - Downloading $name..."; curl -fsSL "$url" -o "rules/$name.txt" || true) &
          done
          wait

          # Merge all rules
          echo "→ Merging rules..."
          {
            echo "[Adblock Plus 2.0]"
            echo "! Title: MobiListChina"
            echo "! Description: MobileWeb Filters"
            echo "! Version: $(date +%Y%m%d%H%M)"
            echo "! Last modified: $(date -u +"%d %b %Y %H:%M UTC")"
            echo "! Expires: 1 day"
            echo "! Homepage: https://github.com/Lky777/MWCP/"
            echo "! ---------------------------------"
            cat rules/*.txt | grep -v '^!' | sort -u
          } > rules/MobiListChina.txt
          
          # Output rule count
          rule_count=$(grep -v '^!' rules/MobiListChina.txt | wc -l)
          echo "✓ Merged successfully! Total rules: $rule_count"

      - name: Commit changes
        if: steps.dl_merge_rules.outcome == 'success'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add rules/MobiListChina.txt
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update ad filters $(date +'%Y-%m-%d')"
            git push
            echo "✓ Changes committed and pushed"
          fi
